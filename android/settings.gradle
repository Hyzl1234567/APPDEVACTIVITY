pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }
plugins { id("com.facebook.react.settings") }

dependencyResolutionManagement {
    // ensure all projects use the same repositories and include Async Storage's local maven repo
    // allow project-level repos (React plugin adds its own maven)
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        // local repo for react-native-async-storage artifacts
        maven {
            url = uri("$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo")
        }
    }
}

extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> ex.autolinkLibrariesFromCommand() }
rootProject.name = 'Project'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
